<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klabakken Regie</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --teamA: #0984e3; --teamB: #e84393; --neutral: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); text-align: center; margin: 0; padding: 10px; }
        
        /* Admin Link Rechtsboven */
        #admin-gate { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; color: #aaa; cursor: pointer; text-decoration: underline; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 480px; margin: 15px auto; border: 2px solid #fff; }
        .status-A { border-top: 10px solid var(--teamA); }
        .status-B { border-top: 10px solid var(--teamB); }
        
        h1 { color: var(--neutral); margin-top: 20px; }
        .timer { font-size: 4rem; font-weight: 900; color: #d63031; }
        .word-box { font-size: 2.2rem; background: #fff3cd; padding: 20px; border: 4px dashed #fdcb6e; border-radius: 15px; margin: 15px 0; font-weight: bold; }
        
        button { background: #00b894; color: white; border: none; padding: 15px 20px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin: 8px 0; width: 90%; }
        .btn-start { background: var(--neutral); animation: pulse 1.5s infinite; }
        .btn-wrong { background: #fab1a0; color: #d63031; }
        .btn-reset { background: #d63031; margin-top: 20px; }
        
        .hidden { display: none; }
        input { width: 85%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ccc; font-size: 1rem; }
        
        .score-row { display: flex; justify-content: space-around; margin: 15px 0; padding: 10px; background: #f8f9fa; border-radius: 15px; }
        .admin-list { text-align: left; font-size: 0.8rem; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; flex: 1; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="admin-gate" onclick="toggleAdminLogin()">Beheer</div>

    <h1>🎭 KLABAKKEN</h1>

    <div id="setup-screen" class="card">
        <div id="admin-login-box" class="hidden" style="margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 10px;">
            <input type="password" id="admin-pass" placeholder="***">
            <button onclick="login(true)" style="font-size: 0.8rem; padding: 5px;">Login als Spelleider</button>
        </div>
        <h3>Speler Login</h3>
        <input type="text" id="username" placeholder="Je voornaam...">
        <button onclick="login(false)">Meedoen!</button>
    </div>

    <div id="word-screen" class="card hidden">
        <h3>Hoi <span id="display-name"></span>!</h3>
        <p>Voer een woord in voor de pot:</p>
        <input type="text" id="user-word" placeholder="bijv. Leeuw">
        <button onclick="submitWord()">In de pot!</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div id="timer" class="timer">30</div>
        <div id="turn-msg" style="font-weight:bold; margin-bottom:10px;"></div>
        
        <div id="player-view">
            <div id="player-active" class="hidden">
                <p>JIJ OMSCHRIJFT:</p>
                <div id="secret-word" class="word-box">...</div>
            </div>
            <div id="spectator-view">
                <p>Raad het woord van:</p>
                <h2 id="active-player-name">?</h2>
            </div>
        </div>

        <div class="score-row">
            <div>Team A: <b id="score-a">0</b></div>
            <div>Team B: <b id="score-b">0</b></div>
        </div>

        <div id="admin-controls" class="hidden">
            <hr>
            <div id="admin-alert" style="color:#01579b; font-size:0.85rem; margin-bottom:10px; font-weight:bold;"></div>
            <div id="admin-word-display" style="background:#f8f9fa; padding:10px; border-radius:10px; border:1px solid #ddd;"></div>
            
            <div id="timer-controls">
                <button class="btn-start" onclick="toggleClock()">START KLOK ▶️</button>
            </div>
            
            <div id="judge-controls" class="hidden">
                <button onclick="judge(true)">GOED ✅</button>
                <button class="btn-wrong" onclick="judge(false)">FOUT / VOLGENDE ❌</button>
            </div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <div class="admin-list"><b>Team A:</b><div id="list-A"></div></div>
                <div class="admin-list"><b>Team B:</b><div id="list-B"></div></div>
            </div>
            
            <button class="btn-reset" onclick="resetGame()">RESET HELE POT & SCORES</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSoSYmzdcse87_E-p6K-DMn_NbQWFnPNU",
            authDomain: "huddlebijdebie26jan.firebaseapp.com",
            databaseURL: "https://huddlebijdebie26jan-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "huddlebijdebie26jan",
            storageBucket: "huddlebijdebie26jan.firebasestorage.app",
            messagingSenderId: "700291377085",
            appId: "1:700291377085:web:d07c390ccdb760d77094d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", isAdmin = false;

        window.toggleAdminLogin = () => document.getElementById('admin-login-box').classList.toggle('hidden');

        window.login = function(asAdmin) {
            if(asAdmin) {
                if(document.getElementById('admin-pass').value === 'bie123') {
                    isAdmin = true;
                    myName = "SPELLEIDER";
                    document.getElementById('setup-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                } else { alert("Fout wachtwoord"); }
            } else {
                myName = document.getElementById('username').value.trim();
                if(!myName) return;
                set(ref(db, 'players/' + myName), { name: myName });
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('word-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = myName;
            }
        };

        window.submitWord = function() {
            const w = document.getElementById('user-word').value.trim();
            if(w) push(ref(db, 'wordpool'), { word: w });
            document.getElementById('word-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        };

        async function setupGame() {
            const pSnap = await get(ref(db, 'players'));
            const wSnap = await get(ref(db, 'wordpool'));
            if(!pSnap.exists() || !wSnap.exists()) return;
            
            const players = Object.keys(pSnap.val());
            const words = Object.values(wSnap.val()).sort(() => Math.random() - 0.5);
            let a = [], b = [];
            players.forEach((n, i) => i % 2 === 0 ? a.push(n) : b.push(n));

            set(ref(db, 'game'), {
                teamA: a, teamB: b, scoreA: 0, scoreB: 0,
                activeTeam: 'A', pIdxA: 0, pIdxB: 0,
                words: words, wIdx: 0, timer: 30,
                clockRunning: false, lastEvent: ''
            });
        }

        window.toggleClock = () => update(ref(db, 'game'), { clockRunning: true });

        window.judge = async function(isCorrect) {
            const s = await get(ref(db, 'game'));
            const d = s.val();
            let up = { clockRunning: false, timer: 30 };

            if(isCorrect) {
                const key = d.activeTeam === 'A' ? 'game/scoreA' : 'game/scoreB';
                up[key] = (d.activeTeam === 'A' ? d.scoreA : d.scoreB) + 1;
                up['game/wIdx'] = (d.wIdx + 1) % d.words.length;
                up['game/lastEvent'] = 'win_' + Date.now();
            } else {
                const nextT = d.activeTeam === 'A' ? 'B' : 'A';
                if(d.activeTeam === 'A') up['game/pIdxA'] = (d.pIdxA + 1) % d.teamA.length;
                else up['game/pIdxB'] = (d.pIdxB + 1) % d.teamB.length;
                up['game/activeTeam'] = nextT;
                up['game/wIdx'] = (d.wIdx + 1) % d.words.length;
            }
            update(ref(db), up);
        };

        onValue(ref(db, 'game'), (snap) => {
            const d = snap.val();
            if(!d) {
                if(!isAdmin) location.reload();
                return;
            }

            document.getElementById('score-a').innerText = d.scoreA;
            document.getElementById('score-b').innerText = d.scoreB;
            document.getElementById('timer').innerText = d.timer;
            
            const activeP = d.activeTeam === 'A' ? d.teamA[d.pIdxA] : d.teamB[d.pIdxB];
            const curW = d.words[d.wIdx]?.word || "OP!";
            
            document.getElementById('active-player-name').innerText = activeP;
            document.getElementById('game-screen').className = `card status-${d.activeTeam}`;
            document.getElementById('turn-msg').innerText = `TEAM ${d.activeTeam} AAN ZET`;

            if(isAdmin) {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('player-view').classList.add('hidden');
                const nTK = d.activeTeam === 'A' ? 'B' : 'A';
                const nP = (nTK === 'A' ? d.teamA[d.pIdxA] : d.teamB[d.pIdxB]);
                document.getElementById('admin-alert').innerText = `WAARSCHUW: ${nP} is hierna!`;
                document.getElementById('admin-word-display').innerHTML = `SPELER: <b>${activeP}</b><br><span style="font-size:2rem; color:red;">${curW}</span>`;
                
                const rL = (arr, act) => arr.map(n => n===act ? `<b>👉 ${n}</b>` : `<span style="opacity:0.5;">${n}</span>`).join('<br>');
                document.getElementById('list-A').innerHTML = rL(d.teamA, activeP);
                document.getElementById('list-B').innerHTML = rL(d.teamB, activeP);

                document.getElementById('timer-controls').classList.toggle('hidden', d.clockRunning);
                document.getElementById('judge-controls').classList.toggle('hidden', !d.clockRunning);
            } else {
                if(myName === activeP) {
                    document.getElementById('player-active').classList.remove('hidden');
                    document.getElementById('secret-word').innerText = d.clockRunning ? curW : "WACHT OP START...";
                    document.getElementById('spectator-view').classList.add('hidden');
                } else {
                    document.getElementById('player-active').classList.add('hidden');
                    document.getElementById('spectator-view').classList.remove('hidden');
                }
            }

            if(d.lastEvent?.startsWith('win')) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        window.resetGame = () => { if(confirm("Alles wissen?")) { remove(ref(db)); location.reload(); }};

        // De spelleider start het spel zodra er genoeg woorden zijn
        setInterval(() => {
            if(isAdmin) {
                get(ref(db, 'game')).then(s => {
                    if(!s.exists()) setupGame(); // Auto-init als er nog niks is
                    const d = s.val();
                    if(d && d.clockRunning && d.timer > 0) update(ref(db, 'game'), { timer: d.timer - 1 });
                    else if(d && d.clockRunning && d.timer === 0) judge(false);
                });
            }
        }, 1000);
    </script>
</body>
</html>
