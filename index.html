<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klabakken Master</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --teamA: #0984e3; --teamB: #e84393; --neutral: #6c5ce7; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: 15px auto; }
        .timer { font-size: 4rem; font-weight: 900; color: #d63031; }
        .word-box { font-size: 2rem; background: #fff3cd; padding: 25px; border: 4px dashed #fdcb6e; border-radius: 15px; margin: 15px 0; font-weight: bold; }
        
        /* Team Kleuren */
        .status-A { border-top: 10px solid var(--teamA); }
        .status-B { border-top: 10px solid var(--teamB); }
        .score-A { color: var(--teamA); font-size: 2.5rem; font-weight: bold; }
        .score-B { color: var(--teamB); font-size: 2.5rem; font-weight: bold; }

        button { background: #00b894; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin: 5px; width: 85%; }
        .btn-start { background: #6c5ce7; animation: pulse 1.5s infinite; }
        .btn-wrong { background: #fab1a0; color: #d63031; }
        .hidden { display: none; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <h1>🎭 KLABAKKEN</h1>

    <div id="setup-screen" class="card">
        <input type="text" id="username" placeholder="Naam..." style="width:80%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;">
        <input type="password" id="admin-pass" placeholder="Wachtwoord (optioneel)" style="width:80%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;">
        <button onclick="login()">Start Spel</button>
    </div>

    <div id="word-screen" class="card hidden">
        <h3>Hoi <span id="display-name"></span>!</h3>
        <p>Voer een woord in voor de pot:</p>
        <input type="text" id="user-word" placeholder="Appel, Leeuw, etc..." style="width:80%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;">
        <button onclick="submitWord()">In de pot!</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div id="timer" class="timer">30</div>
        <div id="turn-msg" style="font-weight:bold; margin-bottom:10px;"></div>
        
        <div id="player-active" class="hidden">
            <p>JIJ OMSCHRIJFT:</p>
            <div id="secret-word" class="word-box">...</div>
        </div>

        <div id="spectator-view">
            <p>Raad het woord van:</p>
            <h2 id="active-player-name">?</h2>
        </div>

        <div id="leaderboard" style="margin-top:20px; font-size: 0.9rem; background: #f9f9f9; padding: 10px; border-radius: 10px;">
            <b>TUSSENSTAND:</b>
            <div style="display:flex; justify-content: space-around;">
                <div>Team A: <span id="score-a" class="score-A">0</span></div>
                <div>Team B: <span id="score-b" class="score-B">0</span></div>
            </div>
        </div>

        <div id="admin-controls" class="hidden">
            <hr>
            <div id="admin-word-view" style="margin-bottom:10px; font-weight:bold;"></div>
            <div id="timer-controls">
                <button id="btn-start-clock" class="btn-start" onclick="toggleClock(true)">START KLOK ▶️</button>
            </div>
            <div id="judge-controls" class="hidden">
                <button onclick="judge(true)">GOED ✅</button>
                <button class="btn-wrong" onclick="judge(false)">FOUT / BEURT WISSEL ❌</button>
            </div>
            <button onclick="resetGame()" style="background:#636e72; font-size: 0.7rem; width:50%;">RESET ALLES</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSoSYmzdcse87_E-p6K-DMn_NbQWFnPNU",
            authDomain: "huddlebijdebie26jan.firebaseapp.com",
            databaseURL: "https://huddlebijdebie26jan-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "huddlebijdebie26jan",
            storageBucket: "huddlebijdebie26jan.firebasestorage.app",
            messagingSenderId: "700291377085",
            appId: "1:700291377085:web:d07c390ccdb760d77094d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName = "", isAdmin = false;

        window.login = function() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return;
            if(document.getElementById('admin-pass').value === 'bie123') isAdmin = true;
            set(ref(db, 'players/' + myName), { name: myName, isAdmin: isAdmin });
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('word-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = myName;
        };

        window.submitWord = function() {
            const w = document.getElementById('user-word').value.trim();
            if(w) push(ref(db, 'wordpool'), { word: w });
            document.getElementById('word-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            if(isAdmin) startGame();
        };

        async function startGame() {
            const pSnap = await get(ref(db, 'players'));
            const wSnap = await get(ref(db, 'wordpool'));
            if(!pSnap.exists() || !wSnap.exists()) return;
            
            const p = Object.keys(pSnap.val());
            const w = Object.values(wSnap.val()).sort(() => Math.random() - 0.5);
            let a = [], b = [];
            p.forEach((n, i) => i % 2 === 0 ? a.push(n) : b.push(n));

            set(ref(db, 'game'), {
                teamA: a, teamB: b, scoreA: 0, scoreB: 0,
                activeTeam: 'A', pIdxA: 0, pIdxB: 0,
                words: w, wIdx: 0, timer: 30,
                clockRunning: false, lastEvent: ''
            });
        }

        window.toggleClock = function(run) {
            update(ref(db, 'game'), { clockRunning: run });
        };

        window.judge = async function(isCorrect) {
            const s = await get(ref(db, 'game'));
            const d = s.val();
            let up = { clockRunning: false, timer: 30 }; // Stop klok altijd na oordeel

            if(isCorrect) {
                const key = d.activeTeam === 'A' ? 'game/scoreA' : 'game/scoreB';
                up[key] = (d.activeTeam === 'A' ? d.scoreA : d.scoreB) + 1;
                up['game/wIdx'] = (d.wIdx + 1) % d.words.length;
                up['game/lastEvent'] = 'win_' + Date.now();
            } else {
                const nextT = d.activeTeam === 'A' ? 'B' : 'A';
                if(d.activeTeam === 'A') up['game/pIdxA'] = (d.pIdxA + 1) % d.teamA.length;
                else up['game/pIdxB'] = (d.pIdxB + 1) % d.teamB.length;
                up['game/activeTeam'] = nextT;
                up['game/wIdx'] = (d.wIdx + 1) % d.words.length;
            }
            update(ref(db), up);
        };

        onValue(ref(db, 'game'), (snap) => {
            const d = snap.val();
            if(!d) return;

            // UI Updates
            document.getElementById('score-a').innerText = d.scoreA;
            document.getElementById('score-b').innerText = d.scoreB;
            document.getElementById('timer').innerText = d.timer;
            
            const activeP = d.activeTeam === 'A' ? d.teamA[d.pIdxA] : d.teamB[d.pIdxB];
            const curW = d.words[d.wIdx]?.word || "OP!";
            
            document.getElementById('active-player-name').innerText = activeP;
            document.getElementById('game-screen').className = `card status-${d.activeTeam}`;
            document.getElementById('turn-msg').innerText = `TEAM ${d.activeTeam} IS AAN DE BEURT`;

            // Player view
            if(myName === activeP) {
                document.getElementById('player-active').classList.remove('hidden');
                document.getElementById('secret-word').innerText = d.clockRunning ? curW : "KLOK MOET NOG STARTEN...";
                document.getElementById('spectator-view').classList.add('hidden');
            } else {
                document.getElementById('player-active').classList.add('hidden');
                document.getElementById('spectator-view').classList.remove('hidden');
            }

            // Admin controls
            if(isAdmin) {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-word-view').innerHTML = `SPELER: ${activeP}<br>WOORD: <span style="color:red">${curW}</span>`;
                document.getElementById('timer-controls').classList.toggle('hidden', d.clockRunning);
                document.getElementById('judge-controls').classList.toggle('hidden', !d.clockRunning);
            }

            if(d.lastEvent?.startsWith('win')) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        });

        window.resetGame = () => { if(confirm("Reset?")) { remove(ref(db)); location.reload(); }};

        // Timer (alleen admin)
        setInterval(() => {
            if(isAdmin) {
                get(ref(db, 'game')).then(s => {
                    const d = s.val();
                    if(d && d.clockRunning && d.timer > 0) update(ref(db, 'game'), { timer: d.timer - 1 });
                    else if(d && d.clockRunning && d.timer === 0) judge(false);
                });
            }
        }, 1000);
    </script>
</body>
</html>
