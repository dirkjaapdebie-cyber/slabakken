<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klabakken Live!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --a: #fdcb6e; --bg: #dfe6e9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); text-align: center; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); max-width: 450px; margin: 15px auto; border: 4px solid white; }
        h1 { color: var(--p); font-size: 2.5rem; margin-bottom: 5px; }
        .timer { font-size: 4rem; font-weight: 900; color: #d63031; margin: 10px 0; }
        .word-box { font-size: 2.2rem; background: #fff3cd; padding: 30px; border: 5px dashed var(--a); border-radius: 15px; margin: 20px 0; color: #2d3436; font-weight: bold; }
        button { background: var(--s); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; width: 80%; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        input { padding: 12px; border-radius: 12px; border: 2px solid #bdc3c7; width: 80%; margin-bottom: 15px; font-size: 1rem; }
        .score-board { display: flex; justify-content: space-around; gap: 10px; margin-top: 10px; }
        .score-box { flex: 1; padding: 10px; border-radius: 15px; color: white; font-weight: bold; }
        .teamA { background: #0984e3; } .teamB { background: #e84393; }
        .hidden { display: none; }
        #turn-msg { font-weight: bold; color: var(--p); font-size: 1.2rem; margin: 10px; }
    </style>
</head>
<body>

    <h1>🎭 KLABAKKEN</h1>

    <div id="setup-screen" class="card">
        <input type="text" id="username" placeholder="Typ je voornaam...">
        <input type="password" id="admin-pass" placeholder="Spelleider wachtwoord?">
        <button onclick="login()">Meedoen!</button>
    </div>

    <div id="word-screen" class="card hidden">
        <h3>Hoi <span id="display-name"></span>!</h3>
        <p>Voer een geheim woord in (Persoon, dier, plant of ding):</p>
        <input type="text" id="user-word" placeholder="Je woord...">
        <button onclick="submitWord()">Stuur naar de pot</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div id="timer" class="timer">30</div>
        <div id="turn-msg">Wachten op start...</div>
        
        <div id="player-active" class="hidden">
            <p>JIJ OMSCHRIJFT NU:</p>
            <div id="secret-word" class="word-box">...</div>
        </div>

        <div id="spectator-view">
            <p>Raad het woord van: <br><strong id="active-player-name" style="font-size: 1.5rem;">?</strong></p>
        </div>

        <div id="admin-controls" class="hidden">
            <hr>
            <p><b>SPELLEIDER DASHBOARD</b></p>
            <p>Huidig woord: <strong id="admin-word-view">?</strong></p>
            <button onclick="judge(true)" style="background: var(--s)">GOED (Punt + Volgend Woord) ✅</button>
            <button onclick="judge(false)" style="background: #fab1a0; color: #d63031">FOUT (Beurt naar tegenstander) ❌</button>
        </div>
    </div>

    <div class="score-board card">
        <div class="score-box teamA">Team A<br><span id="score-a" style="font-size: 2rem;">0</span></div>
        <div class="score-box teamB">Team B<br><span id="score-b" style="font-size: 2rem;">0</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSoSYmzdcse87_E-p6K-DMn_NbQWFnPNU",
            authDomain: "huddlebijdebie26jan.firebaseapp.com",
            databaseURL: "https://huddlebijdebie26jan-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "huddlebijdebie26jan",
            storageBucket: "huddlebijdebie26jan.firebasestorage.app",
            messagingSenderId: "700291377085",
            appId: "1:700291377085:web:d07c390ccdb760d77094d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let isAdmin = false;
        let timerInterval = null;

        window.login = function() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("Vul je naam in!");
            if(document.getElementById('admin-pass').value === 'bie123') isAdmin = true;

            set(ref(db, 'players/' + myName), { name: myName, isAdmin: isAdmin });
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('word-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = myName;
        };

        window.submitWord = function() {
            const word = document.getElementById('user-word').value.trim();
            if(!word) return;
            push(ref(db, 'wordpool'), { word: word });
            document.getElementById('word-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            if(isAdmin) startGame(); // Admin start de boel
        };

        async function startGame() {
            const playersSnap = await get(ref(db, 'players'));
            const players = Object.keys(playersSnap.val());
            const wordsSnap = await get(ref(db, 'wordpool'));
            const words = Object.values(wordsSnap.val()).sort(() => Math.random() - 0.5);

            // Verdelen over teams
            let a = [], b = [];
            players.forEach((n, i) => i % 2 === 0 ? a.push(n) : b.push(n));

            set(ref(db, 'game'), {
                teamA: a, teamB: b,
                scoreA: 0, scoreB: 0,
                activeTeam: 'A',
                pIdxA: 0, pIdxB: 0,
                words: words,
                wIdx: 0,
                timer: 30,
                running: true,
                lastEvent: ''
            });
        }

        // De Spelleider Logica (Judge)
        window.judge = async function(isCorrect) {
            const snap = await get(ref(db, 'game'));
            const data = snap.val();
            let updates = {};

            if(isCorrect) {
                // PUNT EN VOLGEND WOORD
                if(data.activeTeam === 'A') updates['game/scoreA'] = data.scoreA + 1;
                else updates['game/scoreB'] = data.scoreB + 1;
                updates['game/wIdx'] = data.wIdx + 1;
                updates['game/lastEvent'] = 'win_' + Date.now(); // Trigger animatie
            } else {
                // FOUT: WISSEL NAAR TEGENSTANDER
                const nextTeam = data.activeTeam === 'A' ? 'B' : 'A';
                if(data.activeTeam === 'A') updates['game/pIdxA'] = (data.pIdxA + 1) % data.teamA.length;
                else updates['game/pIdxB'] = (data.pIdxB + 1) % data.teamB.length;
                
                updates['game/activeTeam'] = nextTeam;
                updates['game/timer'] = 30; // Reset klok voor de nieuwe speler
                updates['game/wIdx'] = data.wIdx + 1; // Nieuw woord voor de ander
            }
            update(ref(db), updates);
        };

        // UI Updates voor iedereen
        onValue(ref(db, 'game'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            document.getElementById('score-a').innerText = data.scoreA;
            document.getElementById('score-b').innerText = data.scoreB;
            document.getElementById('timer').innerText = data.timer;
            
            const activePlayer = data.activeTeam === 'A' ? data.teamA[data.pIdxA] : data.teamB[data.pIdxB];
            document.getElementById('active-player-name').innerText = activePlayer;
            document.getElementById('turn-msg').innerText = `Team ${data.activeTeam} is nu aan de beurt!`;

            const currentWord = data.words[data.wIdx].word;

            // Speler view
            if(myName === activePlayer) {
                document.getElementById('player-active').classList.remove('hidden');
                document.getElementById('secret-word').innerText = currentWord;
                document.getElementById('spectator-view').classList.add('hidden');
            } else {
                document.getElementById('player-active').classList.add('hidden');
                document.getElementById('spectator-view').classList.remove('hidden');
            }

            // Admin view
            if(isAdmin) {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('admin-word-view').innerText = currentWord;
            }

            // Belonings animatie trigger
            if(data.lastEvent.startsWith('win')) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#6c5ce7', '#00b894', '#fdcb6e'] });
            }
        });

        // Admin regelt de timer
        setInterval(() => {
            if(isAdmin) {
                get(ref(db, 'game')).then(s => {
                    const d = s.val();
                    if(d && d.timer > 0) update(ref(db, 'game'), { timer: d.timer - 1 });
                    else if(d && d.timer === 0) judge(false); // Tijd op = fout
                });
            }
        }, 1000);

    </script>
</body>
</html>
